<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planning Vestizioni — replica Excel (offline)</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #121826;
            --text: #e6eaf2;
            --muted: #9aa4b2;
            --line: #273041;
            --accent: #6ea8fe;
            --ok: #2bd576;
            --bad: #ff6b6b;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f7fb;
                --card: #ffffff;
                --text: #111827;
                --muted: #6b7280;
                --line: #e5e7eb;
                --accent: #2563eb;
            }
        }

        body {
            margin: 0;
            font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px;
        }

        .bar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(0,0,0,0);
            backdrop-filter: blur(10px);
            padding: 10px 0;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .mini {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35;
        }

        .btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
        }

            button.primary {
                background: var(--accent);
                border-color: transparent;
                color: #fff;
            }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,12);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--line);
        }

        th, td {
            border: 1px solid var(--line);
            padding: 7px 8px;
            font-size: 13px;
            vertical-align: top;
        }

            td.ok {
                color: var(--ok);
                font-weight: 600;
            }

        .error {
            color: var(--bad);
        }

        .tool {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        textarea {
            width: 100%;
            min-height: 90px;
            resize: vertical;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text);
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="bar">
            <div class="row">
                <div class="title">Seleziona settimana</div>
                <div class="mini" id="status">Pronto.</div>
            </div>
            <div class="btns" id="weekButtons"></div>
        </div>

        <div class="card" style="margin-top:12px;">
            <div class="mini" style="margin-bottom:10px;">
                Replica Excel: matrice settimana (V2:AB16) → helper (V22:AB49) → planning (A29:L57).<br />
                In più: OSS da tabella 5×(5 settimane×7 giorni) + nomi fissi da STATIC_MAP (ST2/FS2/RR…).
            </div>

            <div class="tool" style="margin-bottom:10px;">
                <div style="flex:1 1 520px;">
                    <div class="mini" style="margin-bottom:6px;">(Opzionale) Incolla una settimana 15x7 (TSV) per test rapido:</div>
                    <textarea id="pasteBox" placeholder="15 righe, 7 colonne. Separatore: TAB."></textarea>
                </div>
                <div style="flex:0 0 auto; display:flex; flex-direction:column; gap:8px; margin-top:20px;">
                    <button id="btnUsePaste">Usa incolla</button>
                    <button id="btnResetWeek">Torna alla settimana selezionata</button>
                </div>
            </div>

            <div style="overflow:auto;">
                <table id="outTable"></table>
            </div>
        </div>
    </div>

/* ============================
   ✅ FUNZIONI
   ============================ */

let selectedWeek = 0;
let pastedOverrideMatrix = null;

        function norm(x) {
            let s = (x ?? "")
                .toString()
                .replace(/\u00A0/g, " ")     // NBSP -> spazio normale
                .trim()
                .replace(/\s+/g, " ")
                .toUpperCase()
                .replace(/º/g, "°")
                .replace(/[°*]/g, "");// º -> °

            // 1) Inserisce spazio tra "M9*" e "2B" quando manca: "M9*2B" -> "M9* 2B"
            // Vale anche per: M14 1-, P6 1A, M5°R2, M5RR, P6F3, M5 2S ecc.
            s = s.replace(
                /([A-Z]\d+(?:\*|°)?)(?=(?:1A|2B|R1|R2|RR|F3|2S)\b)/g,
                "$1 "
            );

            // 2) Normalizza anche casi tipo "M9* 2B -" -> "M9* 2B-"
            s = s.replace(/\s+-/g, "-");

            return s;
        }


// Excel: V W X Y Z AA AB -> 0..6
function dayColToIndex(dayCol){
  const map = ["V","W","X","Y","Z","AA","AB"];
  return map.indexOf(dayCol);
}

function getWeekMatrix(){
  if (pastedOverrideMatrix) return pastedOverrideMatrix;
  const w = WEEKS[selectedWeek];
  if (!w || !Array.isArray(w.matrix)) {
    return Array.from({length:15},()=>Array.from({length:7},()=> ""));
  }
  return w.matrix;
}

/* ---------- OSS parsing (35 codici -> 5 settimane da 7 giorni) ---------- */
function buildOssSchedule(){
  // ossSchedule[ossIndex][ossWeekIndex][dayIndex] = "CODE"
  const out = [];
  for (const line of OSS_RAW_LINES){
    const tokens = line.replace(/\t+/g," ").trim().split(/\s+/);

    // ricostruzione codici giorno:
    // "R" singolo token; altrimenti 2 token (es: "M5 RR", "M34 F3")
    const dayCodes = [];
    for (let i=0;i<tokens.length;i++){
      const t = tokens[i];
      if (!t) continue;
      if (norm(t) === "R"){
        dayCodes.push("R");
      } else {
        const n = tokens[i+1] ?? "";
        if (n && norm(n) !== "R"){
          dayCodes.push(`${t} ${n}`.trim());
          i++;
        } else {
          dayCodes.push(t);
        }
      }
    }

    const weeks = [];
    for (let w=0; w<5; w++){
      weeks.push(dayCodes.slice(w*7, w*7+7));
    }
    out.push(weeks);
  }
  return out;
}

const OSS_SCHEDULE = buildOssSchedule();

function isOssCode(code){
  // OSS = termina con F3 / RR / 2S (e include M34 F3)
  const s = norm(code);
  return /\b(F3|RR|2S)\b$/.test(s);
}

function lookupOSS(dayIdx, code){
  const target = norm(code);
  const ossWeekIdx = (selectedWeek % 5); // ciclico su 5 settimane
  for (let i=0;i<OSS_NAMES.length;i++){
    const c = OSS_SCHEDULE?.[i]?.[ossWeekIdx]?.[dayIdx] ?? "";
    if (norm(c) === target) return OSS_NAMES[i];
  }
  return "";
}

/* ---------- VLOOKUP su 15 infermieri ---------- */
        const lookupCache = {};

        function vlookupNurseName(dayCol, code) {

            const d = dayColToIndex(dayCol);
            if (d < 0) return "";

            const target = norm(code);
            const m = getWeekMatrix();

            const key = d + "_" + target;

            if (!lookupCache[key]) {
                lookupCache[key] = [];
            }

            if (lookupCache[key].length === 0) {

                for (let r = 0; r < 15; r++) {
                    if (norm(m?.[r]?.[d] ?? "") === target) {
                        lookupCache[key].push(
                            (ASSIGNEES[r] ?? "").toString().trim()
                        );
                    }
                }

            }

            return lookupCache[key].shift() ?? "";
        }

/* ---------- Valore helper = Excel-like ---------- */
function helperValue(dayCol, code){
  // 1) prova “VLOOKUP” sugli infermieri
  const nurse = vlookupNurseName(dayCol, code);
  if (nurse) return nurse;

  // 2) se è codice OSS, usa tabella OSS (serve dayIdx)
  const dayIdx = dayColToIndex(dayCol);
  if (dayIdx >= 0 && isOssCode(code)){
    const oss = lookupOSS(dayIdx, code);
    if (oss) return oss;
  }

  // 3) se è un codice statico (ST2/FS2/RR), ritorna da mappa
  const stat = STATIC_MAP[norm(code)];
  if (stat) return stat;

  return "";
}

function computeHelpers(){
  const out = {};
  for (const [coord, def] of Object.entries(HELPER_DEFS)){
    out[coord] = helperValue(def.dayCol, def.code);
  }
  return out;
}

function resolveTemplateCell(cell, helpers){
  if (cell == null) return "";
  if (typeof cell !== "string") return String(cell);
  if (cell.startsWith("=+")){
    const ref = cell.slice(2).trim();
    return helpers[ref] ?? "";
  }
  return cell;
}

function render(){
  const tbl = document.getElementById("outTable");
  const st  = document.getElementById("status");
  const helpers = computeHelpers();

  tbl.innerHTML = "";
  const tb = document.createElement("tbody");

  let filled = 0;

  for (const row of PLANNING_TEMPLATE){
    const tr = document.createElement("tr");
    for (const cell of row){
      const td = document.createElement("td");
      const val = resolveTemplateCell(cell, helpers);
      td.textContent = val;

      if (typeof cell === "string" && cell.startsWith("=+") && val){
        td.classList.add("ok");
        filled++;
      }
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
  tbl.appendChild(tb);

  const label = WEEKS[selectedWeek]?.label ? (" — " + WEEKS[selectedWeek].label) : "";
  const src = pastedOverrideMatrix ? " (sorgente: INCOLLA)" : " (sorgente: WEEKS)";
  st.innerHTML = `Settimana attiva: <b>${selectedWeek+1}</b>${label}${src} — celle valorizzate: <b>${filled}</b>`;
}

function renderButtons(){
  const box = document.getElementById("weekButtons");
  box.innerHTML = "";
  for (let i=0;i<15;i++){
    const b = document.createElement("button");
    b.textContent = "Settimana " + (i+1);
    if (i===selectedWeek) b.classList.add("primary");
    b.addEventListener("click", ()=>{
      selectedWeek=i;
      pastedOverrideMatrix=null;
      renderButtons();
      render();
    });
    box.appendChild(b);
  }
}

function parsePasteBox(text){
  const rows = text.split(/\r?\n/).map(r=>r.trim()).filter(Boolean);
  const matrix = rows.map(r=>r.split("\t").map(x=>x.trim()));
  if (matrix.length !== 15) return null;
  if (!matrix.every(r=>r.length===7)) return null;
  return matrix;
}

window.addEventListener("error", (e)=>{
  const st = document.getElementById("status");
  if (st) st.innerHTML = `<span class="error">Errore JS: ${e.message || "unknown"}</span>`;
});

document.getElementById("btnUsePaste").addEventListener("click", ()=>{
  const txt = document.getElementById("pasteBox").value || "";
  const m = parsePasteBox(txt);
  if (!m){
    alert("Formato incolla non valido: servono 15 righe e 7 colonne separate da TAB.");
    return;
  }
  pastedOverrideMatrix = m;
  render();
});

document.getElementById("btnResetWeek").addEventListener("click", ()=>{
  pastedOverrideMatrix = null;
  render();
});

renderButtons();
render();</script>
