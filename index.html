<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planning Vestizioni — settimane (offline)</title>
  <style>
    :root {
      --bg:#0b0e14; --card:#121826; --text:#e6eaf2; --muted:#9aa4b2; --line:#273041; --accent:#6ea8fe;
      --ok:#2bd576; --bad:#ff6b6b;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f6f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; }
    }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .bar { position: sticky; top: 0; z-index: 20; background: rgba(0,0,0,0); backdrop-filter: blur(10px); padding: 10px 0; }
    .btns { display:flex; flex-wrap:wrap; gap:8px; }
    button {
      border:1px solid var(--line); background: transparent; color: var(--text);
      padding: 8px 10px; border-radius: 12px; cursor:pointer; font-size: 13px;
    }
    button.primary { background: var(--accent); border-color: transparent; color:white; }
    .card { background: var(--card); border:1px solid var(--line); border-radius: 16px; padding: 14px; box-shadow: 0 10px 25px rgba(0,0,0,12); }
    .mini { font-size: 12px; color: var(--muted); line-height:1.35; }
    table { border-collapse: collapse; width: 100%; overflow: hidden; border-radius: 12px; border: 1px solid var(--line); }
    th, td { border:1px solid var(--line); padding: 7px 8px; font-size: 13px; vertical-align: top; }
    th { background: rgba(110,168,254,12); text-align:left; }
    .ok { color: var(--ok); }
    .error { color: var(--bad); }
    .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content: space-between; }
    .title { font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <div class="row">
        <div class="title">Seleziona settimana</div>
        <div class="mini" id="status">Pronto.</div>
      </div>
      <div class="btns" id="weekButtons"></div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="mini" style="margin-bottom:8px;">
        Clicca una settimana: il planning (Foglio4) si aggiorna subito.
      </div>
      <div style="overflow:auto;">
        <table id="outTable"></table>
      </div>
    </div>
  </div>

const ASSIGNEES = (Array.isArray(MODEL.assignees) && MODEL.assignees.length === 15)
  ? MODEL.assignees
  : Array.from({length:15}, (_,i)=>"Persona "+(i+1));

let selectedWeek = 0;

function norm(s) {
  return (s ?? "").toString().trim().replace(/\s+/g, " ").toUpperCase();
}

function currentWeek() {
  return (WEEKS[selectedWeek]?.matrix) || Array.from({length:15}, () => Array.from({length:7}, () => ""));
}

function lookupPasted(dayIdx, code) {
  const target = norm(code);
  const matrix = currentWeek();
  for (let r=0; r<15; r++) {
    if (norm(matrix[r][dayIdx]) === target) {
      return (ASSIGNEES[r] ?? "").toString().trim();
    }
  }
  return "";
}

function lookupStatic(code) {
  const key = (code ?? "").toString().trim();
  return (MODEL.staticMap?.[key] ?? "");
}

function computeCell(cellSpec) {
  if (!cellSpec || typeof cellSpec !== "object") return cellSpec ?? "";
  const {ref, type, code} = cellSpec;
  if (!code) return "";
  if (type === "pasted") {
    const col = ref.match(/^([A-Z]+)\d+$/)?.[1] ?? "";
    const dayIdx = (MODEL.dayCols || []).indexOf(col);
    if (dayIdx < 0) return "";
    return lookupPasted(dayIdx, code);
  }
  if (type === "static") return lookupStatic(code);
  // "other" -> prova staticMap, altrimenti vuoto
  return lookupStatic(code) || "";
}

function renderOutput() {
  const tbl = document.getElementById("outTable");
  tbl.innerHTML = "";
  const tb = document.createElement("tbody");

  for (const row of (MODEL.template || [])) {
    const tr = document.createElement("tr");
    for (const cell of row) {
      const td = document.createElement("td");
      const v = computeCell(cell);
      td.textContent = (v ?? "");
      if (typeof cell === "object" && v) td.classList.add("ok");
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
  tbl.appendChild(tb);

  const filled = Array.from(tbl.querySelectorAll("td.ok")).length;
  const label = WEEKS[selectedWeek]?.label ? " — " + WEEKS[selectedWeek].label : "";
  document.getElementById("status").innerHTML =
    "Settimana attiva: <b>" + (selectedWeek + 1) + "</b>" + label + " — celle valorizzate: <b>" + filled + "</b>";
}

function renderButtons() {
  const box = document.getElementById("weekButtons");
  box.innerHTML = "";

  // sempre 15 pulsanti
  for (let i=0; i<15; i++) {
    const b = document.createElement("button");
    b.textContent = "Settimana " + (i+1);
    if (i === selectedWeek) b.classList.add("primary");
    b.addEventListener("click", () => {
      selectedWeek = i;
      renderButtons();
      renderOutput();
    });
    box.appendChild(b);
  }
}

renderButtons();
renderOutput();
</script>
